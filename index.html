<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portada</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       @font-face {
            font-family: "Sligoil";
            src:
                local("Sligoil"),
                url("fonts/fonts/SligoilVF.ttf") format("truetype"),
                url("fonts/SligoilVF.woff") format("woff");
        }
        .container{
            width: 100vw;
            height: 100vh;
            font-family: "Sligoil";
            display: grid;
            grid-template-columns: repeat(8,1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: .1em;
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        h1{
            grid-column: 1/9;
            grid-row: 3;
            font-size: 20rem;
            margin: 0;
            letter-spacing: 0.1em;
            font-weight: 100;
            position: absolute;
            z-index: 5;
            text-align: center;
        }
        h2{
            font-size: 5em;
            letter-spacing: .08em;
            font-weight: 100;
            padding: 0 0 0 .5em;
            color: #8a8989;
            transform: rotate(70deg);
            position: relative;

        }
    </style>
</head>
